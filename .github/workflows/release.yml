name: Release

# Publishes the package to PyPI when you push a version tag (e.g. v0.0.1).
#
# ── ONE-TIME SETUP (do this once your PyPI account is back) ──────────────
# Recommended: Trusted Publishing (no API token to store).
#   1. On https://pypi.org go to the cdascorer project (or "Publishing" if it
#      doesn't exist yet) -> "Add a pending publisher".
#   2. Fill in:  Owner = joshuandwilliams,  Repo = CDAScorer,
#      Workflow = release.yml,  Environment = pypi
#   That's it — the `id-token: write` permission below does the rest.
#
# Token fallback (if you'd rather not use trusted publishing):
#   - Create a PyPI API token, add it as repo secret PYPI_API_TOKEN, and in the
#     publish step below add:  with: { password: ${{ secrets.PYPI_API_TOKEN }} }
# ─────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Tag version:        $TAG"
          echo "pyproject version:  $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match pyproject.toml version $PKG"
            exit 1
          fi

  build:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
